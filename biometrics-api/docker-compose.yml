services:
  biometrics-api:
    build: .
    ports:
      - "5002:5002"
    volumes:
      - .:/app
    environment:
      DATABASE_URI: mysql+pymysql://root:password@db:3306/bio_api
    depends_on:
      db:
        condition: service_healthy
    restart: always
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bio_api
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
volumes:
  mysql_data: